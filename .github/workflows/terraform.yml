name: 'Terraform'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/**'       # Trigger ONLY if files in /terraform/ change
      - '.github/workflows/**'
  pull_request:


    
permissions:
  contents: read
  id-token: write # Essential for WIF
jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/152133621626/locations/global/workloadIdentityPools/gitaction/providers/github-pool'
          service_account: 'wip-github@cloudstore-489011.iam.gserviceaccount.com'

      # 2. Verify Authentication with gcloud
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify gcloud is authenticated'
        run: |
          gcloud auth list
          gcloud projects list
