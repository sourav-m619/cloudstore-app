name: 'Terraform'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/**'       # Trigger ONLY if files in /terraform/ change
      - '.github/workflows/**'
  pull_request:


    
permissions:
  contents: read
  id-token: write # Essential for WIF
jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate using SA
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
           credentials_json: '${{ secrets.SAGCP }}' # Replace with the name of your GitHub Actions secret
      # 2. Verify Authentication with gcloud
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify gcloud is authenticated'
        run: |
          gcloud auth list
          gcloud projects list
