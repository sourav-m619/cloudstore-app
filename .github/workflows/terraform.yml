name: 'Terraform Infrastructure Pipeline'

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.SAGCP }}'

      # 2. Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # 4. Import Existing WIF Resources (Idempotent)
      - name: Import Existing WIF Resources
        run: |
          # Import the Pool if it doesn't exist in the remote state
          terraform state list | grep -q "^google_iam_workload_identity_pool.github$" || terraform import google_iam_workload_identity_pool.github projects/152133621626/locations/global/workloadIdentityPools/gitaction
          
          # Import the Provider if it doesn't exist in the remote state
          # NOTE: If your provider resource is named differently in your Iam.tf file, update 'github_provider' below!
          terraform state list | grep -q "^google_iam_workload_identity_pool_provider.github_provider$" || terraform import google_iam_workload_identity_pool_provider.github_provider projects/152133621626/locations/global/workloadIdentityPools/gitaction/providers/gitaction

      # 5. Generate Execution Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      # 6. Apply Changes (Only runs on push to main, not on PRs)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve