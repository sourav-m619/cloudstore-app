worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  # Security headers
  add_header X-Frame-Options           "SAMEORIGIN"                    always;
  add_header X-Content-Type-Options    "nosniff"                       always;
  add_header X-XSS-Protection          "1; mode=block"                 always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

  # Gzip
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1000;
  gzip_types      text/plain text/css application/json application/javascript text/javascript;

  access_log /var/log/nginx/access.log;
  sendfile   on;
  keepalive_timeout 65;

  server {
    listen 3000;
    root   /usr/share/nginx/html;
    index  index.html;

    # React Router — serve index.html for all unknown routes
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend K8s service
    location /api/ {
      proxy_pass         http://backend-svc.backend.svc.cluster.local:8080;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy health checks
    location /health {
      proxy_pass http://backend-svc.backend.svc.cluster.local:8080/health;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Never cache HTML
    location ~* \.html$ {
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }
}
