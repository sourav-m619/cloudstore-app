name: 'Test GCP Authentication'

on:
  push:
    branches: 
      - '**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read
  id-token: write # Essential for WIF

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'principal://iam.googleapis.com/projects/152133621626/locations/global/workloadIdentityPools/gitaction/subject/SUBJECT_ATTRIBUTE_VALUE'
          service_account: 'wip-github@cloudstore-489011.iam.gserviceaccount.com'

      # 2. Verify Authentication with gcloud
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify gcloud is authenticated'
        run: |
          gcloud auth list
          gcloud projects list